# Development Profile Configuration

# Server Configuration
server.port=8090

# Database - Local PostgreSQL (or H2 for local development)
# Option 1: Local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/code_test
spring.datasource.username=postgres
spring.datasource.password=postgres

# Option 2: H2 In-Memory (comment out PostgreSQL above and uncomment below)
# spring.datasource.url=jdbc:h2:mem:ktlodb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.hibernate.ddl-auto=create-drop

# Debug Logging
logging.level.com.ktlo.simulator=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JPA
spring.jpa.show-sql=true

# Disable SSL for local PostgreSQL
# spring.datasource.url=jdbc:postgresql://localhost:5432/code_test
