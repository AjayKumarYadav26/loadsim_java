# KTLO Simulator Application Configuration

# Server Configuration
server.port=8090
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=200

# Application Name
spring.application.name=ktlo-simulator

# Threadpool Configuration
async.executor.core-pool-size=10
async.executor.max-pool-size=20
async.executor.queue-capacity=100
async.executor.thread-name-prefix=ktlo-async-

# Azure PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://muliagent.postgres.database.azure.com:5432/code_test?sslmode=require
spring.datasource.username=multiagent
spring.datasource.password=agents@123
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Configuration
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=KtloHikariPool

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logging Configuration
logging.config=classpath:logback-spring.xml
logging.level.root=INFO
logging.level.com.ktlo.simulator=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# JMX Configuration
spring.jmx.enabled=true
spring.jmx.default-domain=com.ktlo.simulator
management.endpoints.jmx.exposure.include=*

# Actuator Configuration
management.endpoints.web.exposure.include=health,metrics,threaddump,heapdump
management.endpoint.health.show-details=always

# Health check configuration - custom health indicator checks only primary datasource
# Exclude default datasource health auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.actuate.autoconfigure.jdbc.DataSourceHealthContributorAutoConfiguration

# Disable automatic datasource health indicators for lazy beans
management.health.hikaricp.enabled=false
management.metrics.enable.hikari=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# File Storage
app.upload.dir=${java.io.tmpdir}/ktlo-uploads
app.upload.cleanup.enabled=true
app.upload.cleanup.max-age-hours=24

# Portal Configuration
app.portal.enabled=true
app.portal.max-concurrent-jobs=50
app.portal.job-timeout-minutes=30

# Simulation Mapping
app.simulation.auto-trigger=true
app.simulation.delay-ms=2000
