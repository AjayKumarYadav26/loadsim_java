<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Document Processing Platform'">Document Processing Platform</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">

    <!-- Font Awesome -->
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.5.1/css/all.min.css}">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/portal.css}">

    <!-- Page-specific CSS -->
    <th:block th:replace="${customCss}"></th:block>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/portal}">
                <i class="fas fa-file-alt me-2"></i>
                Document Processing Platform
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/portal}" th:classappend="${#strings.equals(activePage, 'home')} ? 'active' : ''">
                            <i class="fas fa-home me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/portal/upload}" th:classappend="${#strings.equals(activePage, 'upload')} ? 'active' : ''">
                            <i class="fas fa-upload me-1"></i>Upload
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/portal/dashboard}" th:classappend="${#strings.equals(activePage, 'dashboard')} ? 'active' : ''">
                            <i class="fas fa-chart-line me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin}" th:classappend="${#strings.equals(activePage, 'admin')} ? 'active' : ''">
                            <i class="fas fa-cog me-1"></i>Admin
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mt-4">
        <th:block th:replace="${content}"></th:block>
    </main>

    <!-- Footer -->
    <footer class="footer mt-auto py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">
                Document Processing Platform v1.0.0 |
                <a th:href="@{/actuator/health}" target="_blank">System Health</a>
            </span>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>

    <!-- jQuery -->
    <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>

    <!-- Page-specific JS -->
    <th:block th:replace="${customJs}"></th:block>
</body>
</html>
